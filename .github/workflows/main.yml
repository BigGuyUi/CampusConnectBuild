name: Push To Windows VM
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Check Git        # ← temporary verification step
        shell: powershell
        run: git --version

      - name: Copy to host directory
        shell: powershell
        run: |
          Copy-Item `
            -Path "$env:GITHUB_WORKSPACE\*" `
            -Destination "C:\inetpub\wwwroot" `
            -Recurse `
            -Force
